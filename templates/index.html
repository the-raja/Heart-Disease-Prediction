<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Risk Assessment</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #e8f5e9, #c8e6c9);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            border-radius: 20px;
            border: none;
        }

        .title {
            font-weight: 700;
            color: #1b5e20;
        }

        .form-label {
            font-weight: 500;
            color: #2e7d32;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            border: 1px solid #c8e6c9;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 5px rgba(46, 125, 50, 0.4);
        }

        .submit-btn {
            background-color: #2e7d32;
            border: none;
            border-radius: 30px;
            padding: 10px 40px;
            font-size: 18px;
        }

        .submit-btn:hover {
            background-color: #1b5e20;
        }

        .subtitle {
            font-size: 14px;
            color: #4caf50;
        }
    </style>
</head>

<body>

<div class="container mt-5 mb-5">

    <div class="card shadow-lg p-5">

        <h2 class="text-center title mb-2">
            AI Heart Disease Risk Assessment
        </h2>

        <p class="text-center subtitle mb-4">
            Clinical Multi-Model Prediction System
        </p>

        <form action="/predict" method="POST">

            <div class="row">

                <!-- LEFT COLUMN -->
                <div class="col-md-6">

                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" name="age" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Sex</label>
                        <select class="form-select" name="sex">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Dataset Origin</label>
                        <input type="text" class="form-control" name="dataset" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Chest Pain Type</label>
                        <input type="text" class="form-control" name="cp" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Resting Blood Pressure</label>
                        <input type="number" class="form-control" name="trestbps" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Cholesterol</label>
                        <input type="number" class="form-control" name="chol" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Fasting Blood Sugar</label>
                        <input type="text" class="form-control" name="fbs" required>
                    </div>

                </div>

                <!-- RIGHT COLUMN -->
                <div class="col-md-6">

                    <div class="mb-3">
                        <label class="form-label">Rest ECG</label>
                        <input type="text" class="form-control" name="restecg" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Maximum Heart Rate</label>
                        <input type="number" class="form-control" name="thalch" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Exercise Induced Angina</label>
                        <input type="text" class="form-control" name="exang" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Oldpeak</label>
                        <input type="number" step="0.1" class="form-control" name="oldpeak" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Slope</label>
                        <input type="text" class="form-control" name="slope" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">CA</label>
                        <input type="number" class="form-control" name="ca" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Thal</label>
                        <input type="text" class="form-control" name="thal" required>
                    </div>

                </div>

            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn submit-btn text-white">
                    Generate Clinical Prediction
                </button>
            </div>

        </form>
    </div>

</div>

</body>
</html>
